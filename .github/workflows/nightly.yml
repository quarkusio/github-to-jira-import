name: Nightly Tests

on:
  schedule:
    # Runs at 2 AM UTC (3 AM CET) every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run tests
      env:
        IMPORTS_GITHUB_TOKEN: ${{ secrets.IMPORTS_GITHUB_TOKEN }}
        IMPORTS_JIRA_TOKEN: ${{ secrets.IMPORTS_JIRA_TOKEN }}
      run: mvn test
